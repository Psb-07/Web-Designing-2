<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List App</title>

    <!-- Link to our external stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">

      <!-- ── App Header ── -->
      <header class="header">
        <h1 class="app-title">My To-Do List</h1>
        <p class="app-subtitle">Stay organised, one task at a time.</p>
      </header>

      <!-- ── Add Task Form ── -->
      <div class="input-area">
        <!--
          The input where the user types a new task.
          id="taskInput" lets JavaScript find it easily.
        -->
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="Add a new task…"
          maxlength="120"
          aria-label="New task"
        />
        <!-- Clicking this button calls addTask() in script.js -->
        <button class="btn btn-add" onclick="addTask()" aria-label="Add task">
          + Add
        </button>
      </div>

      <!-- ── Filter Buttons ── -->
      <div class="filters" role="group" aria-label="Filter tasks">
        <button class="filter-btn active" data-filter="all"       onclick="filterTasks(this)">All</button>
        <button class="filter-btn"        data-filter="active"    onclick="filterTasks(this)">Active</button>
        <button class="filter-btn"        data-filter="completed" onclick="filterTasks(this)">Completed</button>
      </div>

      <!-- ── Task List ── -->
      <!--
        Tasks are injected here by JavaScript.
        aria-live="polite" tells screen readers to announce changes.
      -->
      <ul class="task-list" id="taskList" aria-live="polite"></ul>

      <!-- ── Empty State (shown when no tasks exist) ── -->
      <div class="empty-state" id="emptyState" hidden>
        <span class="empty-icon">📋</span>
        <p>No tasks yet — add one above!</p>
      </div>

      <!-- ── Footer Summary & Clear Button ── -->
      <footer class="footer" id="footer" hidden>
        <span id="taskCount" class="task-count"></span>
        <button class="btn btn-clear" onclick="clearCompleted()">
          Clear completed
        </button>
      </footer>

    </div><!-- /.container -->

    <!-- Link to our external JavaScript file (placed at bottom so HTML loads first) -->
    <script src="script.js"></script>
  </body>
</html>
